services:
  postgres:
    image: postgres:16-alpine
    container_name: gateway-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gateway
    ports:
      - "5435:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata:
